name: Pearls Train + Predict

# Run every day at 00:20 UTC, and manual trigger supported
on:
  schedule:
    - cron: "20 0 * * *"
  workflow_dispatch:

jobs:
  train_predict:
    runs-on: ubuntu-latest

    # Job-level env vars for all steps
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      CITY: "Karachi"  # Adjust if needed

    steps:
      # ----------------------
      # Checkout repository
      # ----------------------
      - name: Checkout repo
        uses: actions/checkout@v3

      # ----------------------
      # Set up Python
      # ----------------------
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ----------------------
      # Cache pip packages for faster workflow
      # ----------------------
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ----------------------
      # Install dependencies
      # ----------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ----------------------
      # Run Training Pipeline
      # ----------------------
      - name: Run training pipeline
        env:
          PIPELINE_MODE: training
        run: |
          echo "Running training pipeline in TRAINING mode"
          python -m models.train_model

      # ----------------------
      # Run Prediction Pipeline
      # ----------------------
      - name: Run prediction pipeline
        env:
          PIPELINE_MODE: inference
        run: |
          echo "Running prediction pipeline in INFERENCE mode"
          python -m models.predict